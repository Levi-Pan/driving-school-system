spring.application.name=driving-school-system
server.port=8080
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
app.upload-dir=${UPLOAD_DIR:uploads}
app.bucket.name=${BUCKET:${AWS_S3_BUCKET_NAME:${AWS_S3_BUCKET:}}}
app.bucket.access-key=${ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
app.bucket.secret-key=${SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}
app.bucket.region=${REGION:${AWS_REGION:us-east-1}}
app.bucket.endpoint=${ENDPOINT:${AWS_ENDPOINT_URL:}}
app.bucket.path-style=${AWS_S3_PATH_STYLE:false}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/driving_school?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
