<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教练端</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-role="coach">
<aside class="sidebar">
    <a class="brand" href="/">
        <span class="brand-mark">教</span>
        <div><strong>教练端</strong><small>学员 · 学时 · 排班</small></div>
    </a>
    <nav class="tabs">
        <button class="tab active" data-view="workbench">我的学员</button>
        <button class="tab" data-view="progress">学时记录</button>
        <button class="tab" data-view="schedule">约课安排</button>
        <button class="tab" data-view="availability">空闲时间</button>
        <button class="tab" data-view="profile">个人信息</button>
    </nav>
</aside>

<main class="shell">
    <header class="topbar">
        <div><h1>教练端</h1><p>查看绑定学员、录入学时练车记录、维护空闲时间和查看约课安排。</p></div>
        <div class="top-actions">
            <button class="ghost" id="logoutBtn">退出登录</button>
            <button class="icon-btn" id="refreshBtn" title="刷新数据">↻</button>
        </div>
    </header>

    <section id="workbench" class="view active">
        <div class="metrics" id="coachMetrics">
            <div class="metric"><span>我的学员</span><strong id="metricStudents">0</strong></div>
            <div class="metric"><span>今日课程</span><strong id="metricToday">0</strong></div>
            <div class="metric"><span>本周学时</span><strong id="metricWeekHours">0</strong></div>
            <div class="metric"><span>通过率</span><strong id="metricPassRate">-</strong></div>
        </div>
        <section class="panel">
            <div class="panel-title"><h2>我的学员</h2><span class="muted" id="coachTitleInfo"></span></div>
            <div id="coachStudentList" class="item-list"></div>
        </section>
        <section class="panel">
            <div class="panel-title"><h2>学员考试进度</h2></div>
            <div id="coachExamList" class="item-list"></div>
        </section>
    </section>

    <section id="progress" class="view">
        <section class="panel">
            <div class="panel-title"><h2>录入学时与练车记录</h2></div>
            <form id="progressForm" class="form-grid">
                <label>学员<select name="studentId" id="progressStudent"></select></label>
                <label>练习科目<select name="subject"><option value="科目一">科目一</option><option value="科目二">科目二</option><option value="科目三">科目三</option><option value="科目四">科目四</option></select></label>
                <label>新增学时<input name="hours" type="number" step="0.5" value="4"></label>
                <label>阶段<select name="stage"><option>科目一学习</option><option>科目二训练</option><option>科目三训练</option><option>科目四学习</option></select></label>
                <label class="wide">练车记录<input name="record" value="完成本阶段训练任务"></label>
                <button class="primary" type="submit">保存进度</button>
            </form>
        </section>
    </section>

    <section id="schedule" class="view">
        <section class="panel">
            <div class="panel-title"><h2>约课安排</h2></div>
            <div id="coachLessonList" class="item-list"></div>
        </section>
    </section>

    <section id="availability" class="view">
        <section class="panel">
            <div class="panel-title"><h2>维护空闲时间</h2></div>
            <form id="availabilityForm" class="form-grid compact">
                <input name="coachId" id="availabilityCoach" type="hidden">
                <label class="wide">空闲时间<input name="freeTimes" placeholder="例如：周一上午、周三下午、周六上午"></label>
                <button class="primary" type="submit">保存空闲时间</button>
            </form>
            <div id="coachList" class="coach-grid spaced"></div>
        </section>
    </section>
    <section id="profile" class="view">
        <div class="layout two">
            <section class="panel">
                <div class="panel-title"><h2>个人资料</h2></div>
                <form id="profileForm" class="form-grid">
                    <label class="upload-field">头像
                        <input name="avatar" id="profileAvatar" type="hidden">
                        <input id="avatarFile" type="file" accept="image/*" data-upload-target="profileAvatar" data-preview-target="avatarPreview">
                        <span class="muted">选择图片后自动上传保存</span>
                        <div class="upload-preview" id="avatarPreview">暂无已上传头像</div>
                    </label>
                    <label>姓名<input name="name" id="profileName" required></label>
                    <label>手机号<input name="phone" id="profilePhone" readonly class="readonly-value"></label>
                    <label>准教车型<select name="vehicleType" id="profileVehicleType"><option>C1</option><option>C2</option><option>B1</option><option>B2</option><option>A1</option><option>A2</option><option>A3</option><option>D</option><option>E</option><option>F</option></select></label>
                    <label>性别<select name="gender" id="profileGender"><option value="">选择性别</option><option>男</option><option>女</option></select></label>
                    <label>教龄（年）<input name="yearsOfExperience" id="profileExperience" type="number" min="0"></label>
                    <label class="wide">个人简介<textarea name="bio" id="profileBio" rows="3" placeholder="简要介绍自己.."></textarea></label>
                    <label>状态<span class="readonly-value" id="profileStatus"></span></label>
                    <div></div><div></div>
                    <button class="primary" type="submit">保存资料</button>
                </form>
            </section>
            <section class="panel">
                <div class="panel-title"><h2>修改密码</h2></div>
                <form id="passwordForm" class="form-grid compact">
                    <label>当前密码<input name="oldPassword" type="password" required placeholder="输入当前密码"></label>
                    <label>新密码<input name="newPassword" type="password" required placeholder="至少6位" minlength="6"></label>
                    <label>确认新密码<input name="confirmPassword" type="password" required placeholder="再次输入新密码"></label>
                    <button class="primary" type="submit">修改密码</button>
                </form>
            </section>
        </div>
    </section>
</main>

<dialog id="resultDialog">
    <div class="dialog-head"><h2 id="resultTitle">提示</h2><button class="icon-btn" id="closeResult" title="关闭">×</button></div>
    <div class="dialog-body">
        <p id="resultMessage"></p>
    </div>
    <div class="dialog-actions"><button class="primary" id="confirmResult">确定</button></div>
</dialog>
<div id="toast"></div>
<script src="/common.js?v=6"></script>
<script src="/coach.js?v=2"></script>
</body>
</html>
