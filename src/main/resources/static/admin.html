<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驾校管理员端</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-role="admin">
<aside class="sidebar">
    <a class="brand" href="/">
        <span class="brand-mark">管</span>
        <div><strong>驾校管理员端</strong><small>审核 · 分配 · 统计</small></div>
    </a>
    <nav class="tabs">
        <button class="tab active" data-view="dashboard">业务总览</button>
        <button class="tab" data-view="review">报名审核</button>
        <button class="tab" data-view="studentManage">学员管理</button>
        <button class="tab" data-view="coachManage">教练管理</button>
        <button class="tab" data-view="assign">教练分配</button>
        <button class="tab" data-view="exam">考试成绩</button>
        <button class="tab" data-view="basicConfig">基础信息</button>
        <button class="tab" data-view="stats">统计导出</button>
    </nav>
</aside>

<main class="shell">
    <header class="topbar">
        <div><h1>驾校管理员端</h1><p>处理报名复审、材料生成、教练分配、考试审核和经营统计。</p></div>
        <div class="top-actions">
            <button class="ghost" id="logoutBtn">退出登录</button>
            <button class="icon-btn" id="refreshBtn" title="刷新数据">↻</button>
        </div>
    </header>

    <section id="dashboard" class="view active">
        <div class="metrics" id="metricGrid"></div>
        <section class="panel">
            <div class="panel-title"><h2>学员业务队列</h2><span class="muted">全校学员状态</span></div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>学员</th><th>车型</th><th>状态</th><th>阶段</th><th>学时(①/②/③/④)</th><th>自动初审</th></tr></thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>
        </section>
    </section>

    <section id="review" class="view">
        <div class="filter-bar">
            <div class="filter-tabs" id="reviewFilterTabs">
                <button class="tab active" data-filter="all">全部</button>
                <button class="tab" data-filter="待初审">待初审</button>
                <button class="tab" data-filter="待复审">待复审</button>
                <button class="tab" data-filter="初审驳回">初审驳回</button>
                <button class="tab" data-filter="审核驳回">审核驳回</button>
                <button class="tab" data-filter="审核通过">已通过</button>
            </div>
            <div class="search-group">
                <input type="text" id="reviewSearch" placeholder="搜索姓名/手机号/身份证号" class="search-input">
                <button class="ghost" id="reviewSearchBtn">搜索</button>
            </div>
        </div>
        <section class="panel">
            <div class="panel-title"><h2>报名复审与材料</h2><span class="muted">通过后自动生成报名表、体检表、准考证</span></div>
            <div id="reviewList" class="item-list"></div>
        </section>
    </section>

    <section id="studentManage" class="view">
        <div class="filter-bar">
            <div class="search-group">
                <input type="text" id="studentSearchInput" placeholder="搜索姓名 / 手机号 / 身份证号" class="search-input">
                <button class="ghost" id="studentSearchBtn">搜索</button>
            </div>
            <select id="studentStatusFilter">
                <option value="">全部状态</option>
                <option value="待分配">待分配</option>
                <option value="学习中">学习中</option>
                <option value="可报名考试">可报名考试</option>
                <option value="考试报名待审">考试报名待审</option>
                <option value="待考试">待考试</option>
                <option value="补考安排中">补考安排中</option>
                <option value="等待发证">等待发证</option>
                <option value="已发证">已发证</option>
            </select>
            <select id="studentVehicleFilter">
                <option value="">全部车型</option>
                <option value="C1">C1</option>
                <option value="C2">C2</option>
                <option value="B2">B2</option>
            </select>
        </div>
        <section class="panel">
            <div class="panel-title"><h2>学员档案</h2><span class="muted" id="studentManageCount"></span></div>
            <div id="studentManageList" class="item-list"></div>
        </section>
    </section>

    <section id="coachManage" class="view">
        <section class="panel">
            <div class="panel-title"><h2>教练管理</h2><button class="primary" id="addCoachBtn">新增教练</button></div>
            <div id="coachManageList" class="coach-grid"></div>
        </section>
    </section>

    <section id="assign" class="view">
        <section class="panel">
            <div class="panel-title">
                <h2>教练分配管理</h2>
                <div class="filter-tabs" id="assignFilterTabs">
                    <button class="tab active" data-filter="pending">待分配</button>
                    <button class="tab" data-filter="assigned">已分配</button>
                </div>
            </div>
            <div id="coachAssignList" class="item-list"></div>
            <div id="assignedList" class="item-list" style="display:none"></div>
        </section>
        <section class="panel">
            <div class="panel-title"><h2>教练资源</h2></div>
            <div id="coachList" class="coach-grid"></div>
        </section>
    </section>

    <section id="exam" class="view">
        <div class="filter-bar">
            <div class="filter-tabs" id="examFilterTabs">
                <button class="tab active" data-subject="">全部</button>
                <button class="tab" data-subject="科目一">科目一</button>
                <button class="tab" data-subject="科目二">科目二</button>
                <button class="tab" data-subject="科目三">科目三</button>
                <button class="tab" data-subject="科目四">科目四</button>
            </div>
            <div class="filter-tabs" id="examStatusTabs">
                <button class="tab active" data-status="">全部状态</button>
                <button class="tab" data-status="待审核">待审核</button>
                <button class="tab" data-status="报名成功">报名成功</button>
                <button class="tab" data-status="已出成绩">已出成绩</button>
                <button class="tab" data-status="报名驳回">已驳回</button>
            </div>
        </div>
        <section class="panel">
            <div class="panel-title"><h2>考试审核与成绩管理</h2><span class="muted" id="examCount"></span></div>
            <div id="examList" class="item-list"></div>
        </section>
    </section>

    <section id="basicConfig" class="view">
        <div class="layout two">
            <section class="panel">
                <div class="panel-title"><h2>车型管理</h2><button class="primary" id="addVehicleTypeBtn">新增车型</button></div>
                <div id="vehicleTypeList" class="item-list"></div>
            </section>
            <section class="panel">
                <div class="panel-title"><h2>考场管理</h2><button class="primary" id="addExamVenueBtn">新增考场</button></div>
                <div id="examVenueList" class="item-list"></div>
            </section>
        </div>
    </section>

    <section id="stats" class="view">
        <div class="layout two">
            <section class="panel">
                <div class="panel-title"><h2>报名趋势</h2><button class="ghost" data-export="registrationsByMonth">导出</button></div>
                <canvas id="registrationChart" height="220"></canvas>
            </section>
            <section class="panel">
                <div class="panel-title"><h2>科目合格率</h2><button class="ghost" data-export="subjectPassRates">导出</button></div>
                <canvas id="passRateChart" height="220"></canvas>
            </section>
        </div>
        <div class="layout two">
            <section class="panel">
                <div class="panel-title"><h2>教练工作量</h2><button class="ghost" data-export="coachWorkloads">导出</button></div>
                <canvas id="coachChart" height="260"></canvas>
            </section>
            <section class="panel">
                <div class="panel-title"><h2>状态分布</h2><button class="ghost" data-export="statusCounts">导出</button></div>
                <div id="statusPills" class="status-pills"></div>
            </section>
        </div>
    </section>
</main>

<dialog id="docDialog">
    <div class="dialog-head"><h2 id="docTitle">材料预览</h2><button class="icon-btn" id="closeDoc" title="关闭">×</button></div>
    <div id="docPreview" class="doc-preview"></div>
    <div class="dialog-actions"><button class="ghost" id="exportDoc">导出 HTML</button><button class="primary" id="printDoc">打印 / 另存为 PDF</button></div>
</dialog>
<dialog id="rejectDialog">
    <div class="dialog-head"><h2>审核驳回</h2><button class="icon-btn" id="closeReject" title="关闭">×</button></div>
    <div class="dialog-body">
        <label>驳回原因（必填）<textarea id="rejectReason" rows="4" placeholder="请输入驳回原因..."></textarea></label>
    </div>
    <div class="dialog-actions"><button class="ghost" id="cancelReject">取消</button><button class="danger" id="confirmReject">确认驳回</button></div>
</dialog>
<dialog id="resultDialog">
    <div class="dialog-head"><h2 id="resultTitle">提示</h2><button class="icon-btn" id="closeResult" title="关闭">×</button></div>
    <div class="dialog-body">
        <p id="resultMessage"></p>
    </div>
    <div class="dialog-actions"><button class="primary" id="confirmResult">确定</button></div>
</dialog>
<dialog id="coachFormDialog">
    <div class="dialog-head"><h2 id="coachFormTitle">新增教练</h2><button class="icon-btn" id="closeCoachForm" title="关闭">×</button></div>
    <div class="dialog-body">
        <div class="form-grid compact">
            <label>姓名（必填）<input type="text" id="coachName" placeholder="教练姓名"></label>
            <label>手机号<input type="text" id="coachPhone" placeholder="联系电话"></label>
            <label>教学车型<input type="text" id="coachVehicleType" placeholder="C1 / C2 / B2" value="C1"></label>
            <label>最大带教人数<input type="number" id="coachMaxStudents" value="5" min="1"></label>
            <label>性别<select id="coachGender"><option value="">未设置</option><option value="男">男</option><option value="女">女</option></select></label>
            <label>从业年限<input type="number" id="coachYears" value="0" min="0"></label>
        </div>
        <label class="wide" style="margin-top:12px">个人简介<textarea id="coachBio" rows="3" placeholder="教练简介..."></textarea></label>
    </div>
    <div class="dialog-actions"><button class="ghost" id="cancelCoachForm">取消</button><button class="primary" id="submitCoachForm">保存</button></div>
</dialog>
<dialog id="reassignDialog">
    <div class="dialog-head"><h2 id="reassignTitle">换教练</h2><button class="icon-btn" id="closeReassign" title="关闭">×</button></div>
    <div class="dialog-body">
        <p id="reassignInfo" class="muted"></p>
        <div id="reassignRecommendations" class="item-list" style="max-height:300px;overflow-y:auto"></div>
    </div>
    <div class="dialog-actions"><button class="ghost" id="cancelReassign">取消</button></div>
</dialog>
<dialog id="studentDetailDialog">
    <div class="dialog-head"><h2 id="studentDetailTitle">学员详情</h2><button class="icon-btn" id="closeStudentDetail" title="关闭">×</button></div>
    <div id="studentDetailBody" class="dialog-body" style="max-height:70vh;overflow-y:auto"></div>
    <div class="dialog-actions"><button class="primary" id="closeStudentDetailBtn">关闭</button></div>
</dialog>
<dialog id="vehicleTypeFormDialog">
    <div class="dialog-head"><h2 id="vehicleTypeFormTitle">新增车型</h2><button class="icon-btn" id="closeVehicleTypeForm" title="关闭">×</button></div>
    <div class="dialog-body">
        <div class="form-grid compact">
            <label>车型代码（必填）<input type="text" id="vtName" placeholder="C1 / C2 / B2"></label>
            <label>车型说明<input type="text" id="vtDesc" placeholder="小型汽车"></label>
            <label>最小年龄<input type="number" id="vtMinAge" value="18" min="0"></label>
            <label>最大年龄<input type="number" id="vtMaxAge" value="70" min="0"></label>
            <label>总学时要求<input type="number" id="vtHours" value="68" min="0"></label>
            <label>报名费（元）<input type="number" id="vtRegFee" value="3500" min="0"></label>
            <label>考试费（元）<input type="number" id="vtExamFee" value="500" min="0"></label>
        </div>
    </div>
    <div class="dialog-actions"><button class="ghost" id="cancelVehicleTypeForm">取消</button><button class="primary" id="submitVehicleTypeForm">保存</button></div>
</dialog>
<dialog id="examVenueFormDialog">
    <div class="dialog-head"><h2 id="examVenueFormTitle">新增考场</h2><button class="icon-btn" id="closeExamVenueForm" title="关闭">×</button></div>
    <div class="dialog-body">
        <div class="form-grid compact">
            <label>考场名称（必填）<input type="text" id="evName" placeholder="考场名称"></label>
            <label>考场地址<input type="text" id="evAddress" placeholder="详细地址"></label>
        </div>
        <label class="wide" style="margin-top:12px">可考科目（用、分隔）<input type="text" id="evSubjects" placeholder="科目一、科目四"></label>
        <label class="wide" style="margin-top:8px">考试时间段（用、分隔）<input type="text" id="evTimeSlots" placeholder="上午 09:00、下午 14:00"></label>
    </div>
    <div class="dialog-actions"><button class="ghost" id="cancelExamVenueForm">取消</button><button class="primary" id="submitExamVenueForm">保存</button></div>
</dialog>
<dialog id="examRejectDialog">
    <div class="dialog-head"><h2>驳回考试报名</h2><button class="icon-btn" id="closeExamReject" title="关闭">×</button></div>
    <div class="dialog-body">
        <p id="examRejectInfo" class="muted"></p>
        <label>驳回原因（必填）<textarea id="examRejectReason" rows="3" placeholder="请输入驳回原因…"></textarea></label>
    </div>
    <div class="dialog-actions"><button class="ghost" id="cancelExamReject">取消</button><button class="danger" id="confirmExamReject">确认驳回</button></div>
</dialog>
<dialog id="scoreDialog">
    <div class="dialog-head"><h2 id="scoreDialogTitle">录入成绩</h2><button class="icon-btn" id="closeScore" title="关闭">×</button></div>
    <div class="dialog-body">
        <p id="scoreInfo" class="muted"></p>
        <div class="form-grid compact">
            <label>考试成绩（0-100）<input type="number" id="scoreInput" min="0" max="100" placeholder="请输入分数"></label>
            <label>备注（选填）<input type="text" id="scoreRemark" placeholder="如：正常发挥"></label>
        </div>
        <p id="scorePassLine" class="muted" style="margin-top:8px"></p>
    </div>
    <div class="dialog-actions"><button class="ghost" id="cancelScore">取消</button><button class="primary" id="confirmScore">确认录入</button></div>
</dialog>
<dialog id="certificateDialog">
    <div class="dialog-head"><h2>发证登记</h2><button class="icon-btn" id="closeCertificate" title="关闭">×</button></div>
    <div class="dialog-body">
        <p id="certificateInfo"></p>
    </div>
    <div class="dialog-actions"><button class="ghost" id="cancelCertificate">取消</button><button class="primary" id="confirmCertificate">确认发证</button></div>
</dialog>
<div id="toast"></div>
<script src="/common.js"></script>
<script src="/admin.js"></script>
</body>
</html>
