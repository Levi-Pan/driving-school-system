<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 驾校报名与学员管理系统</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *:before, *:after { padding: 0; margin: 0; box-sizing: border-box; }
        body { background-color: #080710; font-family: 'Poppins', sans-serif; min-height: 100vh; }
        .background { width: 430px; height: 580px; position: absolute; transform: translate(-50%,-50%); left: 50%; top: 50%; }
        .background .shape { height: 200px; width: 200px; position: absolute; border-radius: 50%; }
        .shape:first-child { background: linear-gradient(#1845ad, #23a2f6); left: -80px; top: -80px; }
        .shape:last-child { background: linear-gradient(to right, #ff512f, #f09819); right: -30px; bottom: -80px; }
        form { width: 400px; background-color: rgba(255,255,255,0.13); position: absolute; transform: translate(-50%,-50%); top: 50%; left: 50%; border-radius: 10px; backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 0 40px rgba(8,7,16,0.6); padding: 50px 35px; }
        form * { font-family: 'Poppins', sans-serif; color: #ffffff; letter-spacing: 0.5px; outline: none; border: none; }
        form h3 { font-size: 32px; font-weight: 500; line-height: 42px; text-align: center; }
        label { display: block; margin-top: 20px; font-size: 14px; font-weight: 500; }
        input, select { display: block; height: 48px; width: 100%; background-color: rgba(255,255,255,0.07); border-radius: 3px; padding: 0 10px; margin-top: 6px; font-size: 14px; font-weight: 300; color: #ffffff; }
        select option { background-color: #1a1a2e; color: #ffffff; }
        ::placeholder { color: #e5e5e5; }
        button { margin-top: 30px; width: 100%; background-color: #ffffff; color: #080710; padding: 15px 0; font-size: 18px; font-weight: 600; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #e0e0e0; }
        .auth-link { margin-top: 20px; text-align: center; font-size: 14px; color: rgba(255,255,255,0.7); }
        .auth-link a { color: #23a2f6; text-decoration: none; font-weight: 500; }
        .auth-link a:hover { text-decoration: underline; }
        #toast { position: fixed; right: 22px; bottom: 22px; display: none; max-width: 360px; padding: 12px 14px; border-radius: 8px; color: #fff; background: rgba(23,32,42,0.95); box-shadow: 0 0 30px rgba(0,0,0,0.4); z-index: 20; font-family: 'Poppins', 'Microsoft YaHei', sans-serif; font-size: 14px; }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <form id="registerForm">
        <h3>注册</h3>
        <label for="name">姓名</label>
        <input type="text" placeholder="请输入姓名" id="name" name="name" required>
        <label for="username">账号</label>
        <input type="text" placeholder="请输入自定义账号" id="username" name="username" required autocomplete="username">
        <label for="phone" id="phoneLabel">手机号</label>
        <input type="tel" placeholder="请输入11位手机号" id="phone" name="phone" maxlength="11" pattern="\d{11}">
        <label for="password">密码</label>
        <input type="password" placeholder="请输入密码（至少6位）" id="password" name="password" required minlength="6" autocomplete="new-password">
        <label for="role">角色</label>
        <select id="role" name="role">
            <option value="STUDENT">学员</option>
            <option value="COACH">教练</option>
            <option value="ADMIN">驾校管理员</option>
        </select>
        <button type="submit">注册并登录</button>
        <p class="auth-link">已有账号？<a href="/">返回登录</a></p>
    </form>
    <div id="toast"></div>
    <script src="/auth.js"></script>
</body>
</html>
